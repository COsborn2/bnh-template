name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      web: ${{ steps.filter.outputs.web }}
      api: ${{ steps.filter.outputs.api }}
      ws: ${{ steps.filter.outputs.ws }}
      cron: ${{ steps.filter.outputs.cron }}
      migrate: ${{ steps.filter.outputs.migrate }}
      proxy: ${{ steps.filter.outputs.proxy }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            web:
              - 'apps/web/**'
              - 'packages/theme/**'
              - 'packages/shared/**'
            api:
              - 'apps/api/**'
              - 'packages/db/**'
              - 'packages/email/**'
              - 'packages/shared/**'
            ws:
              - 'apps/ws/**'
              - 'packages/shared/**'
            cron:
              - 'apps/cron/**'
              - 'packages/db/**'
            migrate:
              - 'apps/migrate/**'
              - 'packages/db/**'
            proxy:
              - 'infra/proxy/**'

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Check workspace peer dependencies
        run: bun scripts/check-peer-deps.ts

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: myapp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/myapp_test
      BETTER_AUTH_SECRET: ci-test-secret
      BETTER_AUTH_URL: http://localhost:3000
      TURNSTILE_SECRET_KEY: 1x0000000000000000000000000000000AA
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run migrations
        run: bun run db:migrate

      - name: Test
        run: bun run test

  proxy-config:
    name: Validate Proxy Config
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.proxy == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build proxy image
        run: docker build -t app-proxy ./infra/proxy

      - name: Validate Caddyfile
        run: docker run --rm app-proxy caddy validate --config /etc/caddy/Caddyfile

  docker:
    name: Docker ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [changes, lint, build, test, proxy-config]
    if: ${{ always() && needs.changes.result == 'success' && needs.lint.result == 'success' && needs.build.result == 'success' && needs.test.result == 'success' && (needs.proxy-config.result == 'success' || needs.proxy-config.result == 'skipped') }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: web
            dockerfile: apps/web/Dockerfile
            changed: ${{ needs.changes.outputs.web }}
          - service: api
            dockerfile: apps/api/Dockerfile
            changed: ${{ needs.changes.outputs.api }}
          - service: ws
            dockerfile: apps/ws/Dockerfile
            changed: ${{ needs.changes.outputs.ws }}
          - service: cron
            dockerfile: apps/cron/Dockerfile
            changed: ${{ needs.changes.outputs.cron }}
          - service: migrate
            dockerfile: apps/migrate/Dockerfile
            changed: ${{ needs.changes.outputs.migrate }}
          - service: proxy
            dockerfile: infra/proxy/Dockerfile
            context: infra/proxy
            changed: ${{ needs.changes.outputs.proxy }}
    steps:
      - name: Skip unchanged service
        if: ${{ matrix.changed != 'true' }}
        run: echo "No changes detected for ${{ matrix.service }}, skipping build."

      - uses: actions/checkout@v4
        if: ${{ matrix.changed == 'true' }}

      - name: Log in to GHCR
        if: ${{ matrix.changed == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: ${{ matrix.changed == 'true' }}
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Extract metadata
        if: ${{ matrix.changed == 'true' }}
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.service }}
          tags: |
            type=raw,value=latest,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=sha,format=long

      - name: Build image
        if: ${{ matrix.changed == 'true' }}
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ${{ matrix.context || '.' }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          build-args: |
            ${{ matrix.service == 'web' && format('NEXT_PUBLIC_APP_NAME={0}', vars.NEXT_PUBLIC_APP_NAME) || '' }}
            ${{ matrix.service == 'web' && format('NEXT_PUBLIC_TURNSTILE_SITE_KEY={0}', vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY) || '' }}
