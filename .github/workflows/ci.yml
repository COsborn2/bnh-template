name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}
  REPOSITORY_URL: https://github.com/${{ github.repository }}

jobs:
  changes:
    name: Detect Docker Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      web: ${{ steps.filter.outputs.web }}
      api: ${{ steps.filter.outputs.api }}
      ws: ${{ steps.filter.outputs.ws }}
      cron: ${{ steps.filter.outputs.cron }}
      migrate: ${{ steps.filter.outputs.migrate }}
      proxy: ${{ steps.filter.outputs.proxy }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            web:
              - 'apps/web/**'
              - 'packages/theme/**'
              - 'packages/shared/**'
              - 'bun.lock'
              - 'package.json'
              - 'tsconfig.base.json'
              - 'turbo.json'
            api:
              - 'apps/api/**'
              - 'packages/db/**'
              - 'packages/email/**'
              - 'packages/shared/**'
              - 'bun.lock'
              - 'package.json'
              - 'tsconfig.base.json'
              - 'turbo.json'
            ws:
              - 'apps/ws/**'
              - 'packages/shared/**'
              - 'bun.lock'
              - 'package.json'
              - 'tsconfig.base.json'
              - 'turbo.json'
            cron:
              - 'apps/cron/**'
              - 'packages/db/**'
              - 'bun.lock'
              - 'package.json'
              - 'tsconfig.base.json'
              - 'turbo.json'
            migrate:
              - 'apps/migrate/**'
              - 'packages/db/**'
              - 'bun.lock'
              - 'package.json'
              - 'tsconfig.base.json'
              - 'turbo.json'
            proxy:
              - 'infra/proxy/**'

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.10"

      - name: Cache dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.10"

      - name: Cache dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Check workspace peer dependencies
        run: bun scripts/check-peer-deps.ts

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: myapp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/myapp_test
      BETTER_AUTH_SECRET: ci-test-secret
      BETTER_AUTH_URL: http://localhost:3000
      TURNSTILE_SECRET_KEY: 1x0000000000000000000000000000000AA
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.10"

      - name: Cache dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run migrations
        run: bun run db:migrate

      - name: Test
        run: bun run test

  docker:
    name: Docker ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [changes, lint, build, test]
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - service: web
            dockerfile: apps/web/Dockerfile
            changed: ${{ needs.changes.outputs.web }}
          - service: api
            dockerfile: apps/api/Dockerfile
            changed: ${{ needs.changes.outputs.api }}
          - service: ws
            dockerfile: apps/ws/Dockerfile
            changed: ${{ needs.changes.outputs.ws }}
          - service: cron
            dockerfile: apps/cron/Dockerfile
            changed: ${{ needs.changes.outputs.cron }}
          - service: migrate
            dockerfile: apps/migrate/Dockerfile
            changed: ${{ needs.changes.outputs.migrate }}
          - service: proxy
            dockerfile: infra/proxy/Dockerfile
            context: infra/proxy
            changed: ${{ needs.changes.outputs.proxy }}
    steps:
      - name: Skip unchanged service
        if: ${{ matrix.changed != 'true' }}
        run: echo "No Docker changes detected for ${{ matrix.service }}, skipping."

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        if: ${{ matrix.changed == 'true' }}

      - name: Set up Docker Buildx
        if: ${{ matrix.changed == 'true' }}
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Validate Caddyfile
        if: ${{ matrix.changed == 'true' && matrix.service == 'proxy' }}
        run: docker run --rm -v "$PWD/infra/proxy/Caddyfile:/etc/caddy/Caddyfile:ro" caddy:2-alpine caddy validate --config /etc/caddy/Caddyfile

      - name: Extract publish metadata
        if: ${{ matrix.changed == 'true' && github.event_name == 'push' }}
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=raw,value=latest
            type=sha,format=long
          labels: |
            org.opencontainers.image.title=${{ github.event.repository.name }}-${{ matrix.service }}
            org.opencontainers.image.description=Bun Full-Stack Starter ${{ matrix.service }} container image
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.source=${{ env.REPOSITORY_URL }}

      - name: Prepare image artifact directory
        if: ${{ matrix.changed == 'true' && github.event_name == 'push' }}
        run: mkdir -p "${RUNNER_TEMP}/images"

      - name: Build image
        if: ${{ matrix.changed == 'true' && github.event_name == 'pull_request' }}
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ${{ matrix.context || '.' }}
          file: ${{ matrix.dockerfile }}
          cache-from: type=gha
          build-args: |
            ${{ matrix.service == 'web' && format('NEXT_PUBLIC_APP_NAME={0}', vars.NEXT_PUBLIC_APP_NAME || 'CI') || '' }}
            ${{ matrix.service == 'web' && format('NEXT_PUBLIC_TURNSTILE_SITE_KEY={0}', vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY || 'test') || '' }}

      - name: Build image artifact
        if: ${{ matrix.changed == 'true' && github.event_name == 'push' }}
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ${{ matrix.context || '.' }}
          file: ${{ matrix.dockerfile }}
          tags: local/${{ matrix.service }}:${{ github.sha }}
          outputs: type=docker,dest=${{ runner.temp }}/images/${{ matrix.service }}.tar
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            ${{ matrix.service == 'web' && format('NEXT_PUBLIC_APP_NAME={0}', vars.NEXT_PUBLIC_APP_NAME || 'CI') || '' }}
            ${{ matrix.service == 'web' && format('NEXT_PUBLIC_TURNSTILE_SITE_KEY={0}', vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY || 'test') || '' }}

      - name: Upload image artifact
        if: ${{ matrix.changed == 'true' && github.event_name == 'push' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: image-${{ matrix.service }}
          path: ${{ runner.temp }}/images/${{ matrix.service }}.tar
          compression-level: 0
          if-no-files-found: error
          retention-days: 1

      - name: Record publish tags
        if: ${{ matrix.changed == 'true' && github.event_name == 'push' }}
        run: |
          mkdir -p "$RUNNER_TEMP/tags"
          printf '%s\n' '${{ steps.meta.outputs.tags }}' > "$RUNNER_TEMP/tags/${{ matrix.service }}.txt"

      - name: Upload publish tags
        if: ${{ matrix.changed == 'true' && github.event_name == 'push' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: tags-${{ matrix.service }}
          path: ${{ runner.temp }}/tags/${{ matrix.service }}.txt
          compression-level: 0
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [changes, docker]
    if: ${{ github.event_name == 'push' }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: web
            changed: ${{ needs.changes.outputs.web }}
          - service: api
            changed: ${{ needs.changes.outputs.api }}
          - service: ws
            changed: ${{ needs.changes.outputs.ws }}
          - service: cron
            changed: ${{ needs.changes.outputs.cron }}
          - service: migrate
            changed: ${{ needs.changes.outputs.migrate }}
          - service: proxy
            changed: ${{ needs.changes.outputs.proxy }}
    steps:
      - name: Skip unchanged service
        if: ${{ matrix.changed != 'true' }}
        run: echo "No Docker changes detected for ${{ matrix.service }}, skipping publish."

      - name: Download image artifact
        if: ${{ matrix.changed == 'true' }}
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: image-${{ matrix.service }}
          path: ${{ runner.temp }}/images

      - name: Download publish tags
        if: ${{ matrix.changed == 'true' }}
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: tags-${{ matrix.service }}
          path: ${{ runner.temp }}/tags

      - name: Log in to GHCR
        if: ${{ matrix.changed == 'true' }}
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Load image artifact
        if: ${{ matrix.changed == 'true' }}
        run: docker load --input "${RUNNER_TEMP}/images/${{ matrix.service }}.tar"

      - name: Publish image tags
        if: ${{ matrix.changed == 'true' }}
        run: |
          source_tag="local/${{ matrix.service }}:${{ github.sha }}"
          mapfile -t tags < "${RUNNER_TEMP}/tags/${{ matrix.service }}.txt"
          for tag in "${tags[@]}"; do
            if [[ -n "$tag" ]]; then
              docker tag "$source_tag" "$tag"
              docker push "$tag"
            fi
          done

      - name: Summarize container publishing
        if: ${{ matrix.changed == 'true' }}
        run: |
          {
            echo "### Published \`${{ matrix.service }}\`"
            echo ""
            echo "- Image: \`ghcr.io/${{ github.repository }}/${{ matrix.service }}\`"
            echo "- Repository: ${{ env.REPOSITORY_URL }}"
            echo "- Note: New GHCR container packages default to private. If this is the first publish for this image, open its package settings on GitHub and change visibility to Public for anonymous pulls."
          } >> "$GITHUB_STEP_SUMMARY"

  redeploy:
    name: Redeploy Railway ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [changes, publish]
    if: ${{ github.event_name == 'push' }}
    container: ghcr.io/railwayapp/cli@sha256:10ff70f5b1d65e6eee8d8b7839b917bc88631efa5b5eddaa33a585a7891b254c # latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    strategy:
      matrix:
        include:
          - service: web
            changed: ${{ needs.changes.outputs.web }}
          - service: api
            changed: ${{ needs.changes.outputs.api }}
          - service: ws
            changed: ${{ needs.changes.outputs.ws }}
          - service: cron
            changed: ${{ needs.changes.outputs.cron }}
          - service: migrate
            changed: ${{ needs.changes.outputs.migrate }}
          - service: proxy
            changed: ${{ needs.changes.outputs.proxy }}
    steps:
      - name: Skip unchanged service
        if: ${{ matrix.changed != 'true' }}
        run: echo "No Docker changes detected for ${{ matrix.service }}, skipping Railway redeploy."

      - name: Skip optional cron redeploy
        if: ${{ matrix.changed == 'true' && matrix.service == 'cron' && vars.RAILWAY_ENABLE_CRON_REDEPLOY != 'true' }}
        run: echo "Cron service redeploy is disabled. Set RAILWAY_ENABLE_CRON_REDEPLOY=true if this Railway project includes the optional cron service."

      - name: Redeploy Railway service
        if: ${{ matrix.changed == 'true' && (matrix.service != 'cron' || vars.RAILWAY_ENABLE_CRON_REDEPLOY == 'true') }}
        run: railway redeploy --service "${{ matrix.service }}" --yes

      - name: Summarize Railway redeploy
        if: ${{ matrix.changed == 'true' && (matrix.service != 'cron' || vars.RAILWAY_ENABLE_CRON_REDEPLOY == 'true') }}
        run: |
          {
            echo "### Redeployed Railway \`${{ matrix.service }}\`"
            echo ""
            echo "- Trigger: GHCR publish to \`:latest\` on \`main\`"
            echo "- Command: \`railway redeploy --service ${{ matrix.service }} --yes\`"
          } >> "$GITHUB_STEP_SUMMARY"
